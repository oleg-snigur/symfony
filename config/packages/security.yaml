security:
    # 1. Секція хешування має бути ОДНА
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User: 'auto' # Якщо ви створили свою сутність User

    # 2. Провайдери
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # 3. Firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_feed
            logout:
                path: app_logout

    # 4. Обмеження доступу
    access_control:
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/feed, roles: ROLE_USER }
